services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "6433:5432"
    volumes:
      - ./sql/01_init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./sql/02_init_clickhouse.sql:/docker-entrypoint-initdb.d/02_init.sql
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    ports:
      - "4040:4040"
    volumes:
      - ./spark:/app
      - ./исходные данные:/data/csv
    command: ["sleep", "infinity"]
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

volumes:
  pgdata:
  chdata:
